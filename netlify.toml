[build]
  command = "pnpm run build"
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp/mcp"
  status = 200
  force = true

[[redirects]]
  from = "/"
  to = "/.netlify/functions/mcp/"
  status = 200
  force = true
