[build]
  command = "pnpm run build"
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/.well-known/oauth-protected-resource"
  to = "/.netlify/functions/mcp/.well-known/oauth-protected-resource"
  status = 200
  force = true

[[redirects]]
  from = "/.well-known/oauth-authorization-server"
  to = "/.netlify/functions/mcp/.well-known/oauth-authorization-server"
  status = 200
  force = true

[[redirects]]
  from = "/register"
  to = "/.netlify/functions/mcp/register"
  status = 200
  force = true

[[redirects]]
  from = "/authorize"
  to = "/.netlify/functions/mcp/authorize"
  status = 200
  force = true

[[redirects]]
  from = "/oauth/callback"
  to = "/.netlify/functions/mcp/oauth/callback"
  status = 200
  force = true

[[redirects]]
  from = "/oauth/callback/*"
  to = "/.netlify/functions/mcp/oauth/callback/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/token"
  to = "/.netlify/functions/mcp/token"
  status = 200
  force = true

[[redirects]]
  from = "/token-wrap"
  to = "/.netlify/functions/mcp/token-wrap"
  status = 200
  force = true

[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp/mcp"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/mcp/:splat"
  status = 200
  force = true
