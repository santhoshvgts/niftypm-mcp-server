[build]
  command = "pnpm run build"
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/.well-known/oauth-authorization-server"
  to = "/.netlify/functions/mcp/.well-known/oauth-authorization-server"
  status = 200
  force = true

[[redirects]]
  from = "/oauth/authorize"
  to = "/.netlify/functions/mcp/oauth/authorize"
  status = 200
  force = true

[[redirects]]
  from = "/oauth/callback"
  to = "/.netlify/functions/mcp/oauth/callback"
  status = 200
  force = true

[[redirects]]
  from = "/oauth/token"
  to = "/.netlify/functions/mcp/oauth/token"
  status = 200
  force = true

[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp/mcp"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/mcp/:splat"
  status = 200
  force = true
